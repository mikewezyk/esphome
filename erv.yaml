# SEN55 sensor configuration is adapted from Apollo Automation AIR-1 — see erv_sen55.yaml.

esphome:
  name: erv

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret erv_api_key
  services:
    - service: sen55_clean
      then:
        - sen5x.start_fan_autoclean: sen55

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Erv Fallback Hotspot"
    password: !secret erv_ap_password

captive_portal:

i2c:
  sda: GPIO21
  scl: GPIO22
  id: bus_a

packages:
  sen55: !include erv_sen55.yaml

switch:
  - platform: gpio
    pin: GPIO26
    name: erv_boost
    id: erv_boost

  - platform: gpio
    pin: GPIO25
    inverted: true
    name: erv_power
    id: erv_power

  - platform: template
    name: "ERV AQ Protection"
    id: erv_aq_protection
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

number:
  - platform: template
    name: "ERV PM2.5 Shutoff Threshold"
    id: erv_pm25_shutoff_threshold
    restore_value: true
    initial_value: 35
    min_value: 5
    max_value: 150
    entity_category: "CONFIG"
    unit_of_measurement: "µg/m³"
    optimistic: true
    update_interval: never
    step: 1
    mode: box
  - platform: template
    name: "ERV PM2.5 Resume Threshold"
    id: erv_pm25_resume_threshold
    restore_value: true
    initial_value: 20
    min_value: 5
    max_value: 150
    entity_category: "CONFIG"
    unit_of_measurement: "µg/m³"
    optimistic: true
    update_interval: never
    step: 1
    mode: box
  - platform: template
    name: "ERV VOC Shutoff Threshold"
    id: erv_voc_shutoff_threshold
    restore_value: true
    initial_value: 200
    min_value: 50
    max_value: 500
    entity_category: "CONFIG"
    unit_of_measurement: "index"
    optimistic: true
    update_interval: never
    step: 1
    mode: box
  - platform: template
    name: "ERV VOC Resume Threshold"
    id: erv_voc_resume_threshold
    restore_value: true
    initial_value: 150
    min_value: 50
    max_value: 500
    entity_category: "CONFIG"
    unit_of_measurement: "index"
    optimistic: true
    update_interval: never
    step: 1
    mode: box
  - platform: template
    name: "ERV NOx Shutoff Threshold"
    id: erv_nox_shutoff_threshold
    restore_value: true
    initial_value: 25
    min_value: 1
    max_value: 500
    entity_category: "CONFIG"
    unit_of_measurement: "index"
    optimistic: true
    update_interval: never
    step: 1
    mode: box
  - platform: template
    name: "ERV NOx Resume Threshold"
    id: erv_nox_resume_threshold
    restore_value: true
    initial_value: 15
    min_value: 1
    max_value: 500
    entity_category: "CONFIG"
    unit_of_measurement: "index"
    optimistic: true
    update_interval: never
    step: 1
    mode: box

script:
  # Evaluates current sensor readings against thresholds on every sensor update.
  # Starts the debounce timer if elevated; resumes ERV immediately if all-clear.
  - id: erv_aq_check
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(erv_aq_protection).state && (
                id(pm_2_5).state    > id(erv_pm25_shutoff_threshold).state ||
                id(sen55_voc).state > id(erv_voc_shutoff_threshold).state  ||
                id(sen55_nox).state > id(erv_nox_shutoff_threshold).state
              );
          then:
            - script.execute: erv_aq_debounce
          else:
            - if:
                condition:
                  lambda: |-
                    return id(pm_2_5).state    < id(erv_pm25_resume_threshold).state &&
                           id(sen55_voc).state < id(erv_voc_resume_threshold).state  &&
                           id(sen55_nox).state < id(erv_nox_resume_threshold).state;
                then:
                  - switch.turn_on: erv_power

  # Waits 60s before acting — filters out brief SEN55 autoclean PM spikes (~10s).
  # mode: single means a spike that resolves mid-countdown won't restart the timer;
  # on expiry it re-checks current readings before shutting off.
  - id: erv_aq_debounce
    mode: single
    then:
      - delay: 60s
      - if:
          condition:
            lambda: |-
              return id(erv_aq_protection).state && (
                id(pm_2_5).state    > id(erv_pm25_shutoff_threshold).state ||
                id(sen55_voc).state > id(erv_voc_shutoff_threshold).state  ||
                id(sen55_nox).state > id(erv_nox_shutoff_threshold).state
              );
          then:
            - switch.turn_off: erv_boost
            - switch.turn_off: erv_power
